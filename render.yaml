services:
  - type: web
    name: hrms-lite-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: CORS_ALLOWED_ORIGINS
        value: https://hrms-lite.vercel.app
      - key: MYSQL_DATABASE
        value: hrms
      - key: MYSQL_USER
        fromDatabase:
          name: hrms-mysql
          property: user
      - key: MYSQL_PASSWORD
        fromDatabase:
          name: hrms-mysql
          property: password
      - key: MYSQL_HOST
        fromDatabase:
          name: hrms-mysql
          property: host
      - key: MYSQL_PORT
        fromDatabase:
          name: hrms-mysql
          property: port

databases:
  - name: hrms-mysql
    databaseName: hrms
    plan: free
